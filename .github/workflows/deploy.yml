name: Vainaar publiceren

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Node installeren
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Modules installeren
        run: npm install

      - name: Website bouwen
        run: npm run build

      - name: GitHub Pages instellen
        uses: actions/configure-pages@v5

      - name: Website uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Website publiceren
        id: deployment
        uses: actions/deploy-pages@v4
